<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P.ai Creator</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; text-align: center; padding: 40px 20px; }
    h1 { color: #f4a261; }
    button { 
      padding: 15px 25px; margin: 10px; font-size: 17px; 
      background: #f4a261; color: black; border: none; border-radius: 10px; cursor: pointer;
    }
    #status { margin-top: 20px; font-size: 16px; min-height: 50px; }
  </style>
</head>
<body>
  <h1>P.ai Creator</h1>
  <p>منصة الذكاء الاصطناعي لصناعة المحتوى</p>

  <button onclick="loginWithPi()">تسجيل الدخول بحساب Pi</button>
  <button onclick="makePayment()">دفع 1 Pi (اختبار)</button>

  <div id="status"></div>

  <script>
    Pi.init({ 
      version: "2.0",
      sandbox: true   // مهم جداً للـ Testnet
    });

    let currentUser = null;

    async function loginWithPi() {
      const status = document.getElementById('status');
      status.textContent = "جاري تسجيل الدخول...";

      try {
        const scopes = ['payments', 'username'];
        
        const auth = await Pi.authenticate(scopes, (payment) => {
          console.log("Incomplete payment:", payment);
        });

        currentUser = auth;
        status.innerHTML = `✅ تم تسجيل الدخول بنجاح!<br>مرحباً ${auth.user.username} <span style="color:green">✓</span>`;
      } catch (err) {
        status.innerHTML = `❌ خطأ في تسجيل الدخول: ${err.message}`;
        console.error(err);
      }
    }

    async function makePayment() {
      const status = document.getElementById('status');
      
      if (!currentUser) {
        status.textContent = "❌ يرجى تسجيل الدخول أولاً";
        return;
      }

      status.textContent = "جاري إعداد الدفع...";

      const paymentData = {
        amount: 0.01,   // مبلغ صغير جداً للاختبار
        memo: "اختبار P.ai Creator",
        metadata: { test: true, user: currentUser.user.username }
      };

      const callbacks = {
        onReadyForServerApproval: (paymentId) => {
          console.log("Approval:", paymentId);
          status.innerHTML += "<br>✅ جاري انتظار تأكيدك...";
        },
        onReadyForServerCompletion: (paymentId, txid) => {
          status.innerHTML = `🎉 نجح الدفع!<br>TxID: ${txid}`;
        },
        onCancel: () => status.textContent = "❌ تم إلغاء العملية",
        onError: (error) => status.textContent = `❌ خطأ: ${error.message}`
      };

      try {
        await Pi.createPayment(paymentData, callbacks);
      } catch (err) {
        status.textContent = `❌ فشل إنشاء الدفع: ${err.message}`;
      }
    }
  </script>
</body>
</html>
