<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sona AI Creator</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f1a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1c1c2e;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
    }

    button {
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎬 Sona AI Creator</h2>
  <p id="status">Loading Pi SDK...</p>
  <button onclick="login()">Login with Pi</button>
</div>

<script>
  window.addEventListener("load", function () {
    if (!window.Pi) {
      document.getElementById("status").innerText =
        "Pi SDK not detected. Open in Pi Browser.";
      return;
    }

    Pi.init({ version: "2.0" });
    document.getElementById("status").innerText =
      "Ready to login with Pi ✔";
  });

  async function login() {
    try {
      const scopes = ['username', 'payments'];

      const auth = await Pi.authenticate(scopes);

      document.getElementById("status").innerText =
        "Welcome " + auth.user.username;

    } catch (e) {
      console.log(e);
      document.getElementById("status").innerText =
        "Login failed - try again";
    }
  }
</script>

</body>
</html>
