<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P.ai Creator</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      text-align: center; 
      padding: 50px 20px; 
    }
    button { 
      padding: 15px 30px; 
      margin: 15px; 
      font-size: 18px; 
      background: #f4a261; 
      color: black; 
      border: none; 
      border-radius: 10px; 
    }
    #status { margin: 30px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>P.ai Creator</h1>
  <p>منصة الذكاء الاصطناعي لصناعة المحتوى</p>

  <button onclick="loginWithPi()">تسجيل الدخول بحساب Pi</button>

  <div id="status"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    async function loginWithPi() {
      const status = document.getElementById('status');
      status.innerHTML = "جاري تسجيل الدخول...";

      try {
        const scopes = ['username'];   // فقط username في البداية
        const auth = await Pi.authenticate(scopes);
        
        status.innerHTML = `
          ✅ <strong>تم تسجيل الدخول بنجاح!</strong><br><br>
          اسم المستخدم: <strong>${auth.user.username}</strong><br>
          الرقم: ${auth.user.uid}
        `;
        console.log("✅ Success:", auth);
      } catch (err) {
        status.innerHTML = `❌ خطأ: ${err.message}`;
        console.error(err);
      }
    }
  </script>
</body>
</html>
