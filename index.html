<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pigrok | AI Content Studio</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

    <!-- التنقل -->
    <nav class="p-4 border-b border-gray-800 flex justify-between">
        <h1 class="text-2xl font-bold text-purple-500">Pigrok AI</h1>
        <div id="user-status">جاري التحقق...</div>
    </nav>

    <!-- واجهة العمل -->
    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-gray-900 p-6 rounded-xl">
            <h2 class="text-xl mb-4">إنشاء محتوى</h2>
            <button onclick="generateVideo()" class="w-full bg-purple-600 p-3 rounded mb-2">إنشاء فيديو من صورة</button>
            <button onclick="upgradeAccount()" class="w-full bg-green-600 p-3 rounded">ترقية الحساب (Super Grok)</button>
        </div>

        <div class="col-span-2 bg-gray-900 p-6 rounded-xl">
            <h2 class="text-xl mb-4">وكيل الذكاء الاصطناعي</h2>
            <div id="chat-box" class="h-64 overflow-y-auto border border-gray-700 p-4 mb-4"></div>
            <input type="text" id="prompt" placeholder="اكتب وصفك هنا..." class="w-full p-2 bg-gray-800 rounded">
        </div>
    </main>

    <!-- شروط وسياسات -->
    <footer class="p-6 text-center text-sm text-gray-500">
        <a href="#privacy">سياسة الخصوصية</a> | <a href="#terms">شروط الخدمة</a> | <a href="#refund">سياسة رد الأموال</a>
    </footer>

    <script>
        // تهيئة Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // التحقق من المستخدم
        async function auth() {
            const user = await Pi.authenticate(['username'], () => { alert("خطأ في الاتصال"); });
            document.getElementById('user-status').innerText = "مرحباً: " + user.user.username;
        }
        auth();

        // نظام الدفع للترقية
        async function upgradeAccount() {
            try {
                await Pi.createPayment({
                    amount: 10,
                    memo: "Super Pigrok Upgrade",
                    metadata: { type: "upgrade" }
                }, {
                    onReadyForServerCompletion: () => alert("تمت الترقية بنجاح!"),
                    onCancel: () => alert("تم إلغاء العملية")
                });
            } catch (e) { alert("حدث خطأ في الدفع"); }
        }

        function generateVideo() { alert("جاري الاتصال بمحرك الفيديو..."); }
    </script>
</body>
</html>
