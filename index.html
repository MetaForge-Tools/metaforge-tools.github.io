<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sona AI Creator</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1c1c2e;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      background: #6c5ce7;
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #7f6df2;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🎬 Sona AI Creator</h1>
    <p>Login with your Pi account to continue</p>

    <button onclick="login()">Login with Pi</button>

    <p id="status"></p>
  </div>

  <script>
    const Pi = window.Pi;

    Pi.init({ version: "2.0" });

    async function login() {
      try {
        const scopes = ['username', 'payments'];

        const auth = await Pi.authenticate(scopes, function(payment) {
          console.log(payment);
        });

        document.getElementById("status").innerText =
          "Welcome " + auth.user.username;

        // هنا سننتقل للصفحة الرئيسية لاحقًا
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1500);

      } catch (error) {
        console.error(error);
        document.getElementById("status").innerText =
          "Login failed, try again";
      }
    }
  </script>

</body>
</html>
