<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P.ai Creator - منصة الذكاء الاصطناعي</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #eee; margin: 0; padding: 0; }
    header { background: #1a1a2e; padding: 15px; text-align: center; }
    nav { background: #16213e; padding: 10px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    button { padding: 10px 18px; background: #f4a261; color: black; border: none; border-radius: 8px; cursor: pointer; }
    .section { display: none; padding: 20px; }
    .active { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>P.ai Creator</h1>
    <p>منصة الذكاء الاصطناعي الشاملة</p>
  </header>

  <nav>
    <button onclick="showSection('home')">الرئيسية</button>
    <button onclick="showSection('chat')">دردشة AI</button>
    <button onclick="showSection('image')">توليد صور</button>
    <button onclick="showSection('video')">توليد فيديو</button>
    <button onclick="showSection('library')">مكتبتي</button>
    <button onclick="showSection('subscribe')">الاشتراكات</button>
  </nav>

  <!-- Home -->
  <div id="home" class="section active">
    <h2>مرحباً بك في P.ai Creator</h2>
    <p>أنشئ محتوى احترافي بقوة الذكاء الاصطناعي</p>
  </div>

  <!-- AI Chat -->
  <div id="chat" class="section">
    <h2>خبير الدردشة</h2>
    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." style="width:80%; padding:10px;">
    <button onclick="sendMessage()">إرسال</button>
    <div id="chatOutput"></div>
  </div>

  <!-- باقي الأقسام فارغة الآن وسوف نملأها تدريجياً -->

  <div id="status" style="text-align:center; margin:20px;"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });
    let currentUser = null;

    async function login() {
      try {
        const auth = await Pi.authenticate(['username', 'payments']);
        currentUser = auth;
        document.getElementById('status').innerHTML = `✅ مرحباً ${auth.user.username}`;
      } catch(e) {}
    }

    // تشغيل تسجيل الدخول تلقائياً
    window.onload = login;

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(section).classList.add('active');
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const output = document.getElementById('chatOutput');
      output.innerHTML += `<p><strong>أنت:</strong> ${input.value}</p>`;
      output.innerHTML += `<p><strong>P.ai:</strong> هذا رد تجريبي. الميزة قيد التطوير...</p>`;
      input.value = '';
    }
  </script>
</body>
</html>
