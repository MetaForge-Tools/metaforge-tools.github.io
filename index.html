<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار الدفع - الخطوة 10</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; text-align: center; padding: 60px 20px; }
    button { padding: 20px 50px; font-size: 22px; background: #22c55e; color: black; border: none; border-radius: 15px; }
    #status { margin-top: 40px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>اختبار الدفع - الخطوة 10</h1>
  <button onclick="makePayment()">اضغط هنا للدفع 0.01 Pi</button>
  <div id="status"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    async function makePayment() {
      const status = document.getElementById('status');
      status.innerHTML = "جاري تسجيل الدخول وإعداد الدفع...";

      try {
        // تسجيل دخول مع صلاحية الدفع
        const auth = await Pi.authenticate(['payments', 'username']);
        
        status.innerHTML = "✅ تم تسجيل الدخول<br>جاري إنشاء الدفع...";

        const paymentData = {
          amount: 0.01,
          memo: "اختبار إنهاء الخطوة 10",
          metadata: { test: true }
        };

        const callbacks = {
          onReadyForServerApproval: () => status.innerHTML += "<br>✅ جاهز للتأكيد",
          onReadyForServerCompletion: (pid, txid) => {
            status.innerHTML = `🎉 تم الدفع بنجاح!<br>TxID: ${txid}`;
          },
          onCancel: () => status.innerHTML = "❌ تم إلغاء الدفع",
          onError: (e) => status.innerHTML = "❌ خطأ: " + e.message
        };

        await Pi.createPayment(paymentData, callbacks);

      } catch (e) {
        status.innerHTML = "❌ خطأ: " + e.message;
      }
    }
  </script>
</body>
</html>
