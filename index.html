<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الذكاء الاصطناعي</title>
    <!-- استدعاء مكتبة Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #f4b41a; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>مرحباً بك في منصة صناعة المحتوى</h1>
    <p>هذا التطبيق قيد التطوير...</p>
    
    <!-- زر تسجيل الدخول الخاص بـ Pi -->
    <button id="auth-button">تسجيل الدخول بحساب Pi</button>

    <script>
        // تفعيل وضع الاختبار الخاص بـ Pi Network
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('auth-button').addEventListener('click', function() {
            Pi.authenticate(['username'], onIncompletePaymentFound).then(function(auth) {
                alert("تم تسجيل الدخول بنجاح! مرحباً: " + auth.user.username);
            }).catch(function(error) {
                console.error("حدث خطأ في تسجيل الدخول:", error);
            });
        });

        function onIncompletePaymentFound(payment) {
            console.log("تم العثور على دفعة غير مكتملة:", payment);
        }
    </script>
</body>
</html>
