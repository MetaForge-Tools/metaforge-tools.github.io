<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P.ai Creator - Test Payment</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; text-align: center; padding: 80px 20px; }
    button { padding: 20px 50px; font-size: 22px; background: #22c55e; color: black; border: none; border-radius: 15px; }
  </style>
</head>
<body>
  <h1>اختبار الدفع - الخطوة 10</h1>
  <button onclick="makePayment()">اضغط هنا للدفع 0.01 Pi</button>
  <div id="status" style="margin-top:40px; font-size:18px;"></div>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    async function makePayment() {
      const status = document.getElementById('status');
      status.innerHTML = "جاري الدفع...";

      const paymentData = {
        amount: 0.01,
        memo: "اختبار إنهاء الخطوة 10",
        metadata: { purpose: "developer_checklist" }
      };

      const callbacks = {
        onReadyForServerApproval: () => status.innerHTML += "<br>✅ انتظر التأكيد",
        onReadyForServerCompletion: (pid, txid) => {
          status.innerHTML = `🎉 نجح الدفع!<br>TxID: ${txid}<br><br>الآن يجب أن تكتمل الخطوة 10`;
        },
        onCancel: () => status.innerHTML = "❌ تم الإلغاء",
        onError: (e) => status.innerHTML = "❌ خطأ: " + e.message
      };

      try {
        await Pi.createPayment(paymentData, callbacks);
      } catch (e) {
        status.innerHTML = "❌ فشل: " + e.message;
      }
    }
  </script>
</body>
</html>
